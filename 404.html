<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — AMI Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5ece6;
      font-family: 'DM Sans', sans-serif;
      color: #2e2d4d;
      text-align: center;
      padding: 24px;
    }
    .wrapper { max-width: 480px; }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 6rem;
      font-weight: 700;
      color: #e75a7c;
      line-height: 1;
      margin-bottom: 16px;
    }
    h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p { font-size: 1rem; color: #5a5a7a; margin-bottom: 32px; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 16px 36px;
      background: #e75a7c;
      color: white;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.3s ease;
    }
    a:hover { background: #d14a6a; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
